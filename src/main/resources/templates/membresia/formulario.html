<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Registrar Membresía</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 650px;">
    <div class="card shadow border-0">
        <div class="card-header bg-success text-white p-3">
            <h3 class="mb-0 h4 text-center" th:text="${titulo}">Registrar Nueva Membresía</h3>
        </div>
        <div class="card-body p-4 bg-white rounded-bottom">

            <form th:action="@{/membresia/guardar}" th:object="${membresia}" method="post">

                <!-- 1. Desplegable para asociar el Cliente/Persona -->
                <div class="mb-3">
                    <label for="persona" class="form-label fw-bold text-secondary">Asociar Cliente *</label>
                    <select th:field="*{persona}" class="form-select" id="persona" required>
                        <option value="" disabled selected>--- Seleccione un Socio ---</option>
                        <!-- Recorremos la lista de personas inyectada por el controlador -->
                        <option th:each="p : ${personas}"
                                th:value="${p.id}"
                                th:text="${p.nombre + ' ' + p.apellido}">
                        </option>
                    </select>
                </div>

                <div class="row">
                    <!-- 2. Tipo de Membresía -->
                    <div class="col-md-6 mb-3">
                        <label for="tipo" class="form-label fw-bold text-secondary">Tipo de Membresía</label>
                        <select th:field="*{tipo}" class="form-select" id="tipo" required>
                            <option value="Mensual">Mensual</option>
                            <option value="Trimestral">Trimestral</option>
                            <option value="Semestral">Semestral</option>
                            <option value="Anual">Anual</option>
                        </select>
                    </div>

                    <!-- 3. Precio -->
                    <div class="col-md-6 mb-3">
                        <label for="precio" class="form-label fw-bold text-secondary">Precio (S/)</label>
                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" id="precio" placeholder="100.00" required>
                    </div>
                </div>

                <div class="row">
                    <!-- 4. Fecha de Inicio -->
                    <div class="col-md-6 mb-3">
                        <label for="fechaInicio" class="form-label fw-bold text-secondary">Fecha de Inicio</label>
                        <input type="date" th:field="*{fechaInicio}" class="form-control" id="fechaInicio" required>
                    </div>

                    <!-- 5. Fecha de Vencimiento -->
                    <div class="col-md-6 mb-3">
                        <label for="fechaFin" class="form-label fw-bold text-secondary">Fecha de Vencimiento</label>
                        <input type="date" th:field="*{fechaFin}" class="form-control" id="fechaFin" required>
                    </div>
                </div>

                <!-- 6. Estado de la Membresía -->
                <div class="mb-3">
                    <label for="estado" class="form-label fw-bold text-secondary">Estado</label>
                    <select th:field="*{estado}" class="form-select" id="estado" required>
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                        <option value="Pendiente">Pendiente</option>
                    </select>
                </div>

                <!-- Botones de Acción -->
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/membresia" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-success px-4">Guardar Membresía</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
