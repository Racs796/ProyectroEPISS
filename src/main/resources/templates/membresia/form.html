<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio - Registro de Membresía</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0" th:text="${membresia.id != null} ? 'Modificar Membresía' : 'Asignar Nueva Membresía'">Formulario Membresía</h3>
                </div>
                <div class="card-body">

                    <form th:action="@{/membresia/guardar}" th:object="${membresia}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Seleccionar Socio (Persona):</label>
                            <select th:field="*{persona}" class="form-select" required>
                                <option value="" disabled selected>-- Seleccione un socio disponible --</option>
                                <option th:each="p : ${personas}"
                                        th:value="${p.id}"
                                        th:text="${p.nombre} + ' ' + ${p.apellido} + ' (ID: ' + ${p.id} + ')'">
                                </option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tipo de Plan:</label>
                                <select th:field="*{tipo}" class="form-select" required>
                                    <option value="Mensual">Mensual (30 días)</option>
                                    <option value="Trimestral">Trimestral (90 días)</option>
                                    <option value="Anual">Anual (365 días)</option>
                                    <option value="Pase Diario">Pase Diario</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Precio del Plan (S/.):</label>
                                <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="Ej: 80.00" required />
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Fecha de Inicio:</label>
                                <input type="date" th:field="*{fechaInicio}" class="form-control" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Fecha de Vencimiento:</label>
                                <input type="date" th:field="*{fechaFin}" class="form-control" required />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Estado Inicial:</label>
                            <select th:field="*{estado}" class="form-select" required>
                                <option value="Activo">Activo</option>
                                <option value="Vencido">Vencido</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/membresia}" class="btn btn-secondary">Regresar</a>
                            <button type="submit" class="btn btn-success fw-bold">Guardar Cambios</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
