<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Listado de Membresías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0" th:text="${titulo}">Listado de Membresías</h3>
            <a th:href="@{/membresia/nuevo}" class="btn btn-light btn-sm fw-bold">+ Nueva Membresía</a>
        </div>
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente / Persona</th>
                        <th>Tipo</th>
                        <th>Precio</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="memb: ${membresias}">
                        <td th:text="${memb.id}">1</td>
                        <td th:text="${memb.persona.nombre + ' ' + memb.persona.apellido}">Juan Pérez</td>
                        <td th:text="${memb.tipo}">Mensual</td>
                        <td th:text="${'S/ ' + memb.precio}">S/ 100.0</td>
                        <td th:text="${#temporals.format(memb.fechaInicio, 'dd/MM/yyyy')}">01/01/2026</td>
                        <td th:text="${#temporals.format(memb.fechaFin, 'dd/MM/yyyy')}">31/01/2026</td>
                        <td>
                                    <span class="badge"
                                          th:classappend="${memb.estado == 'Activo' ? 'bg-success' : 'bg-danger'}"
                                          th:text="${memb.estado}">Activo</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/membresia/editar/{id}(id=${memb.id})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/membresia/eliminar/{id}(id=${memb.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar esta membresía?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(membresias)}">
                        <td colspan="8" class="text-center text-muted">No hay membresías registradas actualmente.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
