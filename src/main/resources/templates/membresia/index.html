<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio - Control de Membresías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Historial de Membresías</h3>
            <a th:href="@{/membresia/nuevo}" class="btn btn-light btn-sm fw-bold">Asignar Membresía</a>
        </div>
        <div class="card-body">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Socio (Persona)</th>
                        <th>Tipo de Plan</th>
                        <th>Precio</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="m : ${membresias}">
                        <td th:text="${m.id}"></td>
                        <td th:text="${m.persona.nombre} + ' ' + ${m.persona.apellido}"></td>
                        <td th:text="${m.tipo}"></td>
                        <td th:text="'S/ ' + ${m.precio}"></td>
                        <td th:text="${m.fechaInicio}"></td>
                        <td th:text="${m.fechaFin}"></td>
                        <td>
                            <span th:text="${m.estado}"
                                  th:classappend="${m.estado == 'Activo'} ? 'badge bg-success' : 'badge bg-danger'">
                            </span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/membresia/editar/{id}(id=${m.id})}" class="btn btn-warning btn-sm me-2">Editar</a>
                            <a th:href="@{/membresia/eliminar/{id}(id=${m.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Desea eliminar este registro de membresía?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(membresias)}">
                        <td colspan="8" class="text-center text-muted py-4">No hay membresías registradas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
