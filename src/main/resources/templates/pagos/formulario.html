<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Pago</title>
</head>
<body>

<h2>Registro de Pago</h2>

<form th:action="@{/pago/guardar}" th:object="${pago}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Membresía:</label><br>
    <select th:field="*{membresia}" required>
        <option value="">Seleccione una membresía</option>
        <option th:each="m : ${membresias}"
                th:value="${m.id}"
                th:text="${m.tipo}">
        </option>
    </select>

    <br><br>

    <label>Monto:</label><br>
    <input type="number" step="0.01" th:field="*{monto}" required>

    <br><br>

    <label>Forma de Pago:</label><br>
    <select th:field="*{formaPago}">
        <option value="Efectivo">Efectivo</option>
        <option value="Yape">Yape</option>
        <option value="Plin">Plin</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Transferencia">Transferencia</option>
    </select>

    <br><br>

    <label>Fecha de Pago:</label><br>
    <input type="date" th:field="*{fechaPago}" required>

    <br><br>

    <label>Estado:</label><br>
    <select th:field="*{estado}">
        <option value="Pagado">Pagado</option>
        <option value="Pendiente">Pendiente</option>
        <option value="Anulado">Anulado</option>
    </select>

    <br><br>

    <label>Descripción:</label><br>
    <textarea th:field="*{descripcion}"></textarea>

    <br><br>

    <button type="submit">Guardar</button>

</form>

</body>
</html>
