<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Gym</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#222;
            color:white;
            padding:20px;
            text-align:center;
        }

        .contenedor{
            display:flex;
            justify-content:center;
            gap:30px;
            margin-top:60px;
            flex-wrap:wrap;
        }

        .card{
            width:220px;
            background:white;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.2);
            padding:20px;
            text-align:center;
        }

        .card h2{
            color:#333;
        }

        .card a{
            display:inline-block;
            margin-top:15px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .card a:hover{
            background:#0056b3;
        }

        footer{
            text-align:center;
            margin-top:60px;
            color:#666;
        }
    </style>

</head>

<body>

<header>
    <h1>GYM MANAGEMENT SYSTEM</h1>
    <h3>Panel del Administrador</h3>
</header>

<div class="contenedor">

    <div class="card">
        <h2>Personas</h2>
        <p>Administrar personas registradas.</p>
        <a th:href="@{/persona/lista}">Ingresar</a>
    </div>

    <div class="card">
        <h2>Membresías</h2>
        <p>Administrar membresías.</p>
        <a th:href="@{/membresia/lista}">Ingresar</a>
    </div>

    <div class="card">
        <h2>Pagos</h2>
        <p>Administrar pagos.</p>
        <a th:href="@{/pago/lista}">Ingresar</a>
    </div>

</div>

<footer>
    <p>© 2026 Gym Management System</p>
</footer>

</body>
</html>
