<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencias - SRCAG Gimnasio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f7931e;
            --dark-color: #1a1a1a;
            --accent-color: #00d4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, var(--dark-color) 0%, #2d2d2d 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--secondary-color) !important;
            letter-spacing: 2px;
        }

        .navbar-brand i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.2);
        }

        .page-header h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
        }

        .btn-add {
            background: white;
            color: var(--primary-color);
            font-weight: 700;
            border-radius: 8px;
            padding: 0.7rem 1.5rem;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background: var(--secondary-color);
            color: white;
            transform: translateY(-2px);
        }

        .table-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, var(--dark-color) 0%, #2d2d2d 100%);
            color: white;
        }

        .table thead th {
            padding: 1.2rem;
            font-weight: 700;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table tbody td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #e9ecef;
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background: #f8f9fa;
        }

        .btn-view {
            background: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.85rem;
            margin-right: 0.3rem;
        }

        .btn-view:hover {
            background: #00bfff;
            color: white;
            transform: translateY(-2px);
        }

        .btn-edit {
            background: var(--secondary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.85rem;
            margin-right: 0.3rem;
        }

        .btn-edit:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background: #c82333;
            color: white;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--primary-color);
            opacity: 0.3;
            display: block;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 1.5rem;
            }

            .btn-view, .btn-edit, .btn-delete {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
                margin-right: 0.2rem;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/home">
            <i class="bi bi-lightning-fill"></i>SRCAG GYM
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/home">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/persona">Socios</a></li>
                <li class="nav-item"><a class="nav-link active" href="/asistencia">Asistencias</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container my-5">
    <!-- PAGE HEADER -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h2><i class="bi bi-check-circle"></i> Registro de Asistencias</h2>
            <p class="mb-0 mt-2" style="opacity: 0.9;">Control diario de acceso a la gimnasia</p>
        </div>
        <a href="/asistencia/nuevo" class="btn btn-add">
            <i class="bi bi-plus-circle"></i> Nueva Asistencia
        </a>
    </div>

    <!-- TABLE -->
    <div class="table-card">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Socio</th>
                        <th>Fecha</th>
                        <th>Hora Entrada</th>
                        <th>Hora Salida</th>
                        <th>Duración</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="asistencia : ${asistencias}">
                        <td><strong th:text="${asistencia.id}"></strong></td>
                        <td th:text="${asistencia.persona.nombre + ' ' + asistencia.persona.apellido}"></td>
                        <td th:text="${asistencia.fechaAsistencia}"></td>
                        <td th:text="${asistencia.horaEntrada}"></td>
                        <td th:text="${asistencia.horaSalida}"></td>
                        <td>
                            <span class="badge bg-info" th:text="${asistencia.duracion}"></span>
                        </td>
                        <td>
                            <span class="badge bg-success">
                                <i class="bi bi-check-circle"></i> Confirmada
                            </span>
                        </td>
                        <td class="text-center">
                            <a href="#" class="btn-view">
                                <i class="bi bi-eye"></i> Ver
                            </a>
                            <a href="#" class="btn-edit">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a href="#" class="btn-delete" onclick="return confirm('¿Desea eliminar?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(asistencias)}">
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <p>No hay registros de asistencia aún.</p>
                                <a href="/asistencia/nuevo" class="btn btn-sm" style="background: var(--primary-color); color: white;">
                                    <i class="bi bi-plus"></i> Registrar Primera Asistencia
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
