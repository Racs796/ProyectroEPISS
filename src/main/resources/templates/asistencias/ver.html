<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Asistencia - SRCAG Gimnasio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f7931e;
            --dark-color: #1a1a1a;
            --accent-color: #00d4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, var(--dark-color) 0%, #2d2d2d 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--secondary-color) !important;
            letter-spacing: 2px;
        }

        .navbar-brand i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .content-container {
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .info-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .card-header h2 {
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
        }

        .card-body {
            padding: 2.5rem;
        }

        .info-group {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e9ecef;
        }

        .info-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            font-weight: 700;
            color: var(--dark-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        .info-label i {
            margin-right: 0.7rem;
            color: var(--primary-color);
        }

        .info-value {
            font-size: 1.1rem;
            color: #333;
            margin-left: 1.8rem;
        }

        .status-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 700;
            margin-left: 1.8rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e9ecef;
        }

        .btn-back {
            flex: 1;
            background: #6c757d;
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-back:hover {
            background: #5a6268;
            transform: translateY(-2px);
            color: white;
        }

        .btn-edit {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
            color: white;
        }

        @media (max-width: 576px) {
            .card-header {
                padding: 1.5rem;
            }

            .card-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/home">
            <i class="bi bi-lightning-fill"></i>SRCAG GYM
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/home">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/persona">Socios</a></li>
                <li class="nav-item"><a class="nav-link active" href="/asistencia">Asistencias</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="content-container">
    <div class="info-card">
        <!-- HEADER -->
        <div class="card-header">
            <h2><i class="bi bi-check-circle"></i> Detalles de Asistencia</h2>
        </div>

        <!-- BODY -->
        <div class="card-body">
            <!-- INFORMACIÓN DEL SOCIO -->
            <div class="info-group">
                <div class="info-label">
                    <i class="bi bi-person-circle"></i> Socio
                </div>
                <div class="info-value" th:text="${asistencia.persona.nombre + ' ' + asistencia.persona.apellido}">
                    Juan Pérez
                </div>
            </div>

            <!-- FECHA DE ASISTENCIA -->
            <div class="info-group">
                <div class="info-label">
                    <i class="bi bi-calendar-event"></i> Fecha de Asistencia
                </div>
                <div class="info-value" th:text="${asistencia.fechaAsistencia}">
                    2024-01-15
                </div>
            </div>

            <!-- HORA DE ENTRADA -->
            <div class="info-group">
                <div class="info-label">
                    <i class="bi bi-clock"></i> Hora de Entrada
                </div>
                <div class="info-value" th:text="${asistencia.horaEntrada}">
                    06:00 AM
                </div>
            </div>

            <!-- HORA DE SALIDA -->
            <div class="info-group">
                <div class="info-label">
                    <i class="bi bi-clock"></i> Hora de Salida
                </div>
                <div class="info-value" th:text="${asistencia.horaSalida}">
                    07:30 AM
                </div>
            </div>

            <!-- DURACIÓN -->
            <div class="info-group">
                <div class="info-label">
                    <i class="bi bi-hourglass-split"></i> Duración
                </div>
                <div class="info-value" th:text="${asistencia.duracion}">
                    1 hora 30 minutos
                </div>
            </div>

            <!-- ESTADO -->
            <div class="info-group">
                <div class="info-label">
                    <i class="bi bi-shield-check"></i> Estado
                </div>
                <span class="status-badge">
                    <i class="bi bi-check-circle"></i> Confirmada
                </span>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">
                <a href="/asistencia" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Atrás
                </a>
                <a href="#" class="btn-edit">
                    <i class="bi bi-pencil"></i> Editar
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
