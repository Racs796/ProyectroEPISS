<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control de Gimnasio - Gestión de Socios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Lista de Socios (Personas)</h3>
            <a th:href="@{/persona/nuevo}" class="btn btn-light btn-sm fw-bold">Agregar Socio</a>
        </div>
        <div class="card-body">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${personas}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.nombre}"></td>
                        <td th:text="${p.apellido}"></td>
                        <td th:text="${p.email}"></td>
                        <td th:text="${p.telefono}"></td>
                        <td th:text="${p.direccion}"></td>
                        <td class="text-center">
                            <a th:href="@{/persona/editar/{id}(id=${p.id})}" class="btn btn-warning btn-sm me-2">
                                Editar
                            </a>
                            <a th:href="@{/persona/eliminar/{id}(id=${p.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar este socio?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(personas)}">
                        <td colspan="7" class="text-center text-muted py-4">No hay socios registrados en el sistema.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
