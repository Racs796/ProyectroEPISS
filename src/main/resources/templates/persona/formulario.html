<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control de Gimnasio - Registrar Socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0 text-center">Registrar Nuevo Socio</h3>
        </div>
        <div class="card-body p-4">

            <form th:action="@{/persona/guardar}" th:object="${persona}" method="post">

                <!-- Campo Nombre -->
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-bold text-secondary">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" id="nombre" placeholder="Ej. Juan" required>
                </div>

                <!-- Campo Apellido -->
                <div class="mb-3">
                    <label for="apellido" class="form-label fw-bold text-secondary">Apellido</label>
                    <input type="text" th:field="*{apellido}" class="form-control" id="apellido" placeholder="Ej. Pérez" required>
                </div>

                <!-- Campo Email -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold text-secondary">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="juan.perez@example.com" required>
                </div>

                <!-- Campo Teléfono -->
                <div class="mb-3">
                    <label for="telefono" class="form-label fw-bold text-secondary">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-control" id="telefono" placeholder="Ej. 999888777">
                </div>

                <!-- Campo Dirección -->
                <div class="mb-3">
                    <label for="direccion" class="form-label fw-bold text-secondary">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control" id="direccion" placeholder="Ej. Av. El Sol 123">
                </div>

                <!-- Botones -->
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/persona" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Socio</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
