<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Socio - SRCAG Gimnasio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f7931e;
            --dark-color: #1a1a1a;
            --accent-color: #00d4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, var(--dark-color) 0%, #2d2d2d 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--secondary-color) !important;
            letter-spacing: 2px;
        }

        .navbar-brand i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .form-container {
            max-width: 600px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .form-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .form-header h2 {
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
        }

        .form-header p {
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .form-body {
            padding: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e9ecef;
        }

        .btn-cancel {
            flex: 1;
            background: #6c757d;
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-cancel:hover {
            background: #5a6268;
            transform: translateY(-2px);
            color: white;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        @media (max-width: 576px) {
            .form-header {
                padding: 1.5rem;
            }

            .form-body {
                padding: 1.5rem;
            }

            .form-header h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/home">
            <i class="bi bi-lightning-fill"></i>SRCAG GYM
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/home">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" href="/persona">Socios</a></li>
                <li class="nav-item"><a class="nav-link" href="/membresia">Membresías</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- FORM CONTAINER -->
<div class="form-container">
    <div class="form-card">
        <!-- HEADER -->
        <div class="form-header">
            <h2><i class="bi bi-person-plus"></i> Registrar Nuevo Socio</h2>
            <p>Completa los datos para agregar un nuevo socio</p>
        </div>

        <!-- FORM BODY -->
        <div class="form-body">
            <form th:action="@{/persona/guardar}" th:object="${persona}" method="post">

                <!-- NOMBRE -->
                <div class="form-group">
                    <label for="nombre" class="form-label">
                        <i class="bi bi-person"></i> Nombre
                    </label>
                    <input type="text" th:field="*{nombre}" class="form-control" id="nombre" 
                           placeholder="Ej. Juan" required>
                </div>

                <!-- APELLIDO -->
                <div class="form-group">
                    <label for="apellido" class="form-label">
                        <i class="bi bi-person-vcard"></i> Apellido
                    </label>
                    <input type="text" th:field="*{apellido}" class="form-control" id="apellido" 
                           placeholder="Ej. Pérez" required>
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope"></i> Email
                    </label>
                    <input type="email" th:field="*{email}" class="form-control" id="email" 
                           placeholder="juan.perez@example.com" required>
                </div>

                <!-- TELÉFONO -->
                <div class="form-group">
                    <label for="telefono" class="form-label">
                        <i class="bi bi-telephone"></i> Teléfono
                    </label>
                    <input type="text" th:field="*{telefono}" class="form-control" id="telefono" 
                           placeholder="Ej. 999888777">
                </div>

                <!-- DIRECCIÓN -->
                <div class="form-group">
                    <label for="direccion" class="form-label">
                        <i class="bi bi-geo-alt"></i> Dirección
                    </label>
                    <input type="text" th:field="*{direccion}" class="form-control" id="direccion" 
                           placeholder="Ej. Av. El Sol 123">
                </div>

                <!-- ACTION BUTTONS -->
                <div class="action-buttons">
                    <a href="/persona" class="btn-cancel">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                    <button type="submit" class="btn-save">
                        <i class="bi bi-check-circle"></i> Guardar Socio
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
