<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control de Gimnasio - Formulario Socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0" th:text="${persona.id != null} ? 'Editar Socio' : 'Registrar Nuevo Socio'">Formulario de Socio</h3>
                </div>
                <div class="card-body">

                    <form th:action="@{/persona/guardar}" th:object="${persona}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nombre:</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Apellido:</label>
                                <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: Pérez" required />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="juan.perez@example.com" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Teléfono:</label>
                            <input type="text" th:field="*{telefono}" class="form-control" placeholder="Ej: +51 987654321" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Dirección:</label>
                            <input type="text" th:field="*{direccion}" class="form-control" placeholder="Ej: Av. Sol 123" />
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/persona}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success fw-bold">Guardar Socio</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
