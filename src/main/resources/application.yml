server:
  port: 7060

spring:
  application:
    name: SRCAG
  datasource:
    url: jdbc:h2:mem:srcag_db
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
    spring:
      security:
        user:
          name: admin
          password: admin123